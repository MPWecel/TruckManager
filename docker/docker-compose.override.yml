# Local-dev overlay. Auto-merged by `docker compose` when both files are passed via -f, or when compose is invoked from this directory.

services:

  postgres:
    ports:
      # Host:Container. Expose Postgres so EF Core migrations + DB tools can reach it from the host.
      - "5432:5432"

  api:
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      # Phase 7 / Section A   Serilog level overrides via env vars.
      # `__` is the ASP.NET Core configuration-key separator; dots inside category names stay literal (e.g. `Microsoft.AspNetCore`). 
      # Compose's map-form `environment:` accepts the dotted keys without YAML quoting because the dot isn't a YAML special character.
      # Uncomment + adjust any of the lines below to override appsettings.json `Serilog` values at container start without rebuilding the image:
      # Serilog__MinimumLevel__Default: Debug
      # Serilog__MinimumLevel__Override__Microsoft.AspNetCore: Information
      # Serilog__MinimumLevel__Override__Microsoft.EntityFrameworkCore: Information
      # Serilog__MinimumLevel__Override__TruckManager: Verbose
    ports:
      # Host:Container. Container listens on 8080 (set by the aspnet:9.0 base image).
      - "5000:8080"
